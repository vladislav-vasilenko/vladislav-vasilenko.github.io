name: RAG Vacancy Scraper (Cron)

on:
  schedule:
    # Запускать каждый день каждые 4 часа
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Позволяет запускать Action вручную из вкладки Actions

jobs:
  run-rag-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешение на коммит изменений обратно в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Run RAG Job Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd tools/cv_matcher
          uv run cv_matcher.py
          
      - name: Commit and push updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Мы добавляем только JSON отчет, не трогая векторную базу (она слишком объемная)
          git add public/matcher_data.json
          
          # Коммитим только если есть изменения
          if git diff --staged --quiet; then
            echo "No new jobs found or no changes in JSON. Skipping commit."
          else
            git commit -m "🤖 [Bot] Умное обновление рейтинга вакансий (RAG)"
            git push
          fi
