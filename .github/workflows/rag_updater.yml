name: RAG Vacancy Scraper (manual only)

# Cron disabled while we stabilise the scrapeвЖТtreeвЖТcluster-map pipeline in
# daily-scrape.yml. This workflow now runs ONLY on manual trigger via the
# Actions tab (workflow_dispatch). To re-enable the schedule, restore:
#   schedule:
#     - cron: '0 */4 * * *'
on:
  workflow_dispatch:

jobs:
  run-rag-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # –†–∞–Ј—А–µ—И–µ–љ–Є–µ –љ–∞ –Ї–Њ–Љ–Љ–Є—В –Є–Ј–Љ–µ–љ–µ–љ–Є–є –Њ–±—А–∞—В–љ–Њ –≤ —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–є

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Run RAG Job Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd tools/cv_matcher
          uv run cv_matcher.py
          
      - name: Commit and push updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # –Ь—Л –і–Њ–±–∞–≤–ї—П–µ–Љ —В–Њ–ї—М–Ї–Њ JSON –Њ—В—З–µ—В, –љ–µ —В—А–Њ–≥–∞—П –≤–µ–Ї—В–Њ—А–љ—Г—О –±–∞–Ј—Г (–Њ–љ–∞ —Б–ї–Є—И–Ї–Њ–Љ –Њ–±—К–µ–Љ–љ–∞—П)
          git add public/matcher_data.json
          
          # –Ъ–Њ–Љ–Љ–Є—В–Є–Љ —В–Њ–ї—М–Ї–Њ –µ—Б–ї–Є –µ—Б—В—М –Є–Ј–Љ–µ–љ–µ–љ–Є—П
          if git diff --staged --quiet; then
            echo "No new jobs found or no changes in JSON. Skipping commit."
          else
            git commit -m "рЯ§Ц [Bot] –£–Љ–љ–Њ–µ –Њ–±–љ–Њ–≤–ї–µ–љ–Є–µ —А–µ–є—В–Є–љ–≥–∞ –≤–∞–Ї–∞–љ—Б–Є–є (RAG)"
            git push
          fi
