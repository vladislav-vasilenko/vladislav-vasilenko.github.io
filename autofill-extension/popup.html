<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="glass-container">
        <header>
            <h1>JobAutoFill <span>Magic</span></h1>
            <p>Precision AI Injection</p>
        </header>

        <main>
            <div class="profile-card">
                <div class="user-info">
                    <div class="avatar">VV</div>
                    <div>
                        <h3>Vasilenko Vladislav</h3>
                        <p>Senior AI Engineer</p>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="autofill-btn" class="magic-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    Inject Experience
                </button>
            </div>

            <div class="ai-prompt-section">
                <textarea id="ai-prompt"
                    placeholder="Ask AI to fill anything... (e.g. 'Summarize my technical skills')"></textarea>
                <button id="ai-fill-btn" class="ai-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3M15.5 7.5l-2-2m2 2l2 2" />
                    </svg>
                    AI Fill Active Field
                </button>
            </div>

            <div id="status" class="status-msg">Ready to assist</div>
        </main>

        <footer>
            <span>v1.0.0</span>
            <a href="#">Settings</a>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>

</html>
