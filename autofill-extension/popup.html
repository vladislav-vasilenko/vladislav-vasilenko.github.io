<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Cover Letter Modal -->
    <div id="coverLetterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2>Cover Letter Generated</h2>
                    <p id="modelUsed" class="model-badge"></p>
                </div>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="coverLetterText" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button id="copyBtn" class="action-btn copy-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy
                </button>
                <button id="exportMdBtn" class="action-btn export-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export to Markdown
                </button>
            </div>
        </div>
    </div>

    <div class="glass-container">
        <header>
            <h1>JobAutoFill <span>Magic</span></h1>
            <p>Precision AI Injection</p>
        </header>

        <main>
            <div class="profile-card">
                <div class="user-info">
                    <div class="avatar">VV</div>
                    <div>
                        <h3>Vasilenko Vladislav</h3>
                        <p>Senior AI Engineer</p>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="autofill-btn" class="magic-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    Inject Experience
                </button>

                <div class="coverletter-section">
                    <select id="model-select" class="model-select">
                        <option value="gpt-4o-mini">GPT-4o Mini (Fast)</option>
                        <option value="gpt-4o">GPT-4o (Balanced)</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="gpt-5.4">GPT-5.4 (Premium)</option>
                        <option value="gpt-5-mini-2025-08-07">GPT-5 Mini</option>
                    </select>
                    <p class="coverletter-disclaimer">⚠️ Demo feature - Portfolio AI showcase</p>
                    <button id="coverletter-btn" class="magic-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        Generate Cover Letter
                    </button>
                </div>
            </div>

            <div class="ai-prompt-section">
                <textarea id="ai-prompt"
                    placeholder="Ask AI to fill anything... (e.g. 'Summarize my technical skills')"></textarea>
                <button id="ai-fill-btn" class="ai-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3M15.5 7.5l-2-2m2 2l2 2" />
                    </svg>
                    AI Fill Active Field
                </button>
            </div>

            <div id="status" class="status-msg">Ready to assist</div>
        </main>

        <footer>
            <span>v1.0.0</span>
            <a href="#">Settings</a>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>

</html>
