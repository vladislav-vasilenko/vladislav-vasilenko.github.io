<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { 
        width: 250px; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        padding: 15px; 
        margin: 0;
    }
    h4 {
        margin-top: 0;
        color: #0a66c2;
    }
    button { 
        width: 100%; 
        padding: 10px; 
        background: #0a66c2; 
        color: white; 
        border: none; 
        border-radius: 4px; 
        font-weight: bold;
        cursor: pointer; 
    }
    button:hover { 
        background: #004182; 
    }
    #status { 
        margin-top: 15px; 
        font-size: 13px; 
        color: #666; 
        line-height: 1.4;
    }
  </style>
</head>
<body>
  <h4>LinkedIn Scraper</h4>
  <button id="scrapeBtn">Scrape Connections</button>
  <div id="status">Please navigate to the <a href="https://www.linkedin.com/mynetwork/invite-connect/connections/" target="_blank">Connections page</a> first.</div>
  
  <script src="popup.js"></script>
</body>
</html>
